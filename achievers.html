<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>தகவல் பலகை | Merit Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-slate-50 text-slate-800">

    <header class="bg-[#0b6623] text-white py-8 px-6 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 id="boardTitle" class="text-2xl font-black uppercase tracking-wider">தகவல் பலகை</h1>
                <p class="text-green-100 text-sm">அண்ணா அரசு மாதிரி மேல்நிலைப் பள்ளி, பட்டீஸ்வரம்</p>
            </div>
            <a href="index.html" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-sm font-bold transition">
                <i class="bi bi-arrow-left me-2"></i> முகப்பு பக்கம்
            </a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100">
                            <th class="p-5 text-sm font-bold text-slate-500 uppercase">சாதனையாளர்</th>
                            <th class="p-5 text-sm font-bold text-slate-500 uppercase">கல்வியாண்டு</th>
                            <th class="p-5 text-sm font-bold text-slate-500 uppercase">சாதனை விவரம்</th>
                        </tr>
                    </thead>
                    <tbody id="boardContent">
                        <tr><td colspan="3" class="p-10 text-center text-slate-400">தகவல்கள் ஏற்றப்படுகின்றன...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '1LnCBeyd4DswXVlRossI5ZAZCkvqGa4bZDT72_VBaXTA';
 // Robust function to fix Google Drive links
    function getDirectLink(url) {
        if (!url) return 'https://placehold.co/100x100?text=User';
        
        // Check if it's a Google Drive link
        if (url.includes('drive.google.com')) {
            let fileId = '';
            
            // Extract ID from different Drive URL formats
            if (url.includes('/d/')) {
                fileId = url.split('/d/')[1].split('/')[0];
            } else if (url.includes('id=')) {
                fileId = url.split('id=')[1].split('&')[0];
            }
            
            return fileId ? `https://lh3.googleusercontent.com/u/0/d/${fileId}` : url;
        }
        
        return url; // Return as is if it's already a direct link or not Drive
    }

    async function fetchSpecificData() {
        const urlParams = new URLSearchParams(window.location.search);
        const sheetName = urlParams.get('type') || 'Sheet1'; 
        
        const titles = {
            'Sheet1': '12-ஆம் வகுப்பு சாதனையாளர்கள்',
            'Sheet2': '10-ஆம் வகுப்பு சாதனையாளர்கள்',
            'Sheet3': 'கல்வி உதவித்தொகை பெற்றோர்',
            'Sheet4': 'ஆசிரியர் சாதனைகள்'
        };
        document.getElementById('boardTitle').innerText = titles[sheetName] || 'தகவல் பலகை';

        const container = document.getElementById('boardContent');
        
        try {
            const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`);
            const csv = await response.text();
            
            const rows = csv.split('\n').map(row => 
                row.split(',').map(cell => cell.replace(/"/g, '').trim())
            );

            const dataRows = rows.slice(1);

            if (dataRows.length === 0) {
                container.innerHTML = `<tr><td colspan="3" class="p-10 text-center italic">தகவல்கள் ஏதும் இல்லை.</td></tr>`;
                return;
            }

            container.innerHTML = dataRows.map(row => {
                const photoUrl = getDirectLink(row[1]); // Fixes the link here
                
                return `
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition">
                        <td class="p-5">
                            <div class="flex items-center gap-4">
                                <img src="${photoUrl}" 
                                     onerror="this.src='https://placehold.co/100x100?text=Error'"
                                     class="w-12 h-12 rounded-full object-cover border-2 border-slate-100 shadow-sm">
                                <span class="font-bold text-slate-800">${row[0]}</span>
                            </div>
                        </td>
                        <td class="p-5 font-medium text-slate-600">${row[2]}</td>
                        <td class="p-5">
                            <span class="px-3 py-1 bg-green-50 text-green-700 rounded-lg text-sm font-bold border border-green-100">
                                ${row[3]}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');

        } catch (error) {
            container.innerHTML = `<tr><td colspan="3" class="p-10 text-center text-red-500">தகவல்களைப் பெறுவதில் சிக்கல்.</td></tr>`;
        }
    }

    window.onload = fetchSpecificData;
</script>
</body>
</html>
