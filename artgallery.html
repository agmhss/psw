<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGMHSS Student Art Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .swiper-slide img { width: 100%; height: 520px; object-fit: contain; background: #111; }
    .caption { background: rgba(0,0,0,0.7); }
  </style>
</head>
<body class="bg-zinc-950 text-white">

  <div class="max-w-7xl mx-auto py-8 px-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-10">
      <div>
        <h1 class="text-5xl font-bold tracking-tight">AGMHSS</h1>
        <p class="text-2xl text-amber-400">Student Painting Showcase</p>
      </div>
      <button onclick="refreshGallery()" 
              class="px-6 py-3 bg-amber-500 hover:bg-amber-600 text-black font-semibold rounded-xl flex items-center gap-2">
        <span>↻</span> Refresh Gallery
      </button>
    </div>

    <!-- Carousel -->
    <div class="swiper mySwiper">
      <div id="swiper-wrapper" class="swiper-wrapper"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-button-next"></div>
      <div class="swiper-pagination"></div>
    </div>

    <p class="text-center text-zinc-500 mt-8 text-sm">
      Paintings are automatically loaded from the shared Google Drive folder.<br>
      New paintings appear instantly after you click "Refresh Gallery".
    </p>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxxR5gF9qdmcj0V0p5F-QucLlMPexig_wwNaVVP-TSLnbRuIF2XaRM99wpz44vU9JXzPQ/exec';   

    async function loadGallery() {
      const wrapper = document.getElementById('swiper-wrapper');
      wrapper.innerHTML = '<div class="swiper-slide flex items-center justify-center"><p class="text-2xl">Loading beautiful paintings...</p></div>';

      try {
        const res = await fetch(WEB_APP_URL);
        const images = await res.json();

        wrapper.innerHTML = '';

        images.forEach(img => {
          // Optional: parse filename like "10A-Ram-Peacock.jpg"
          let student = 'Student';
          let title = img.name.replace(/\.\w+$/, '');
          const parts = img.name.split(/[_\-]/);
          if (parts.length > 2) {
            student = parts[1];
            title = parts.slice(2).join(' ').replace(/\.\w+$/, '');
          }

          const slide = document.createElement('div');
          slide.className = 'swiper-slide relative';
          slide.innerHTML = `
            <img src="${img.url}" alt="${img.name}" loading="lazy">
            <div class="caption absolute bottom-0 left-0 right-0 text-white p-6">
              <p class="text-amber-300 text-xl font-medium">${student}</p>
              <p class="text-3xl font-semibold">${title}</p>
              <p class="text-xs opacity-70 mt-1">Added: ${new Date(img.created).toLocaleDateString('en-IN')}</p>
            </div>
          `;
          wrapper.appendChild(slide);
        });

        // Initialize Swiper
        new Swiper('.mySwiper', {
          loop: true,
          autoplay: { delay: 4000, disableOnInteraction: false },
          pagination: { el: '.swiper-pagination', clickable: true },
          navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
          slidesPerView: 1,
          spaceBetween: 20,
          breakpoints: { 768: { slidesPerView: 2 } }
        });

      } catch(e) {
        wrapper.innerHTML = `<div class="swiper-slide text-red-400 text-center">Error loading gallery.<br>Please check the Web App URL.</div>`;
      }
    }

    function refreshGallery() {
      loadGallery();
    }

    // Load on page open
    window.onload = loadGallery;
  </script>
</body>
</html>
