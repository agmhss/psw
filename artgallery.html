<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Art Exhibition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-header">
        <h1>Student Art Exhibition</h1>
        <p>Celebrating the creativity of our bright minds.</p>
    </div>

    <div class="art-gallery" id="gallery-container">
        <p id="loading-msg" style="text-align:center; width:100%; grid-column: 1 / -1;">
            Curating the exhibition... Fetching artworks...
        </p>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img class="lightbox-content" id="expanded-img">
    </div>

    <script src="script.js"></script>
</body>
</html>
