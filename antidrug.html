<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>மன்றம் - நிர்வாகப் பக்கம்</title>
    <style>
        /* [Keeping previous CSS for the Whiteboard look] */
        :root { --primary-maroon: #8d1b3d; --board-bg: #fdfdfd; }
        body { background: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .whiteboard { background: var(--board-bg); max-width: 1000px; margin: auto; border: 12px solid #333; padding: 40px; position: relative; min-height: 80vh; }
        
        /* Home Button Style */
        .home-btn { 
            position: absolute; top: 15px; left: 15px; 
            background: var(--primary-maroon); color: white; 
            padding: 8px 15px; text-decoration: none; border-radius: 4px; font-weight: bold;
        }

        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 50px; }
        .paper-note { background: white; padding: 20px; box-shadow: 3px 3px 10px rgba(0,0,0,0.1); border-top: 5px solid var(--primary-maroon); }
        .loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="whiteboard">
    <a href="index.html" class="home-btn">🏠 முகப்பு</a>

    <header style="text-align:center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
        <h1 style="color: var(--primary-maroon);">அண்ணா அரசு மாதிரி மேல்நிலைப் பள்ளி</h1>
        <h2 id="club-title">போதைப்பொருள் எதிர்ப்பு மன்றம்</h2>
    </header>

    <div class="content-grid" id="data-container">
        <p class="loading">தகவல்கள் சேகரிக்கப்படுகின்றன (Loading data...)</p>
    </div>

    <div style="margin-top: 40px; text-align: center;">
        <hr>
        <p><strong>வெளிப்புற இணைப்புகள் (Links):</strong></p>
        <div id="links-container"></div>
    </div>
</div>

<script>
    // PASTE YOUR PUBLISHED GOOGLE SHEET CSV URL HERE
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHg5f_0mw89wVEefGyHDwk7Gu5TRcDIKuTvu8owjwQODVGO1Xpaxy2hWlAHJDQrxG8LWmLHM79ud3b/pub?output=csv";

    async function fetchSheetData() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // Skip header row
            
            const container = document.getElementById('data-container');
            const linksContainer = document.getElementById('links-container');
            container.innerHTML = ''; // Clear loading text

            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length < 2) return;

                const category = cols[0].trim();
                const content = cols[1].trim();
                const subtext = cols[2] ? cols[2].trim() : '';

                if (category === "Vision" || category === "Mission") {
                    container.innerHTML += `
                        <div class="paper-note">
                            <h3 style="color:var(--primary-maroon)">${category === "Vision" ? "நோக்கம்" : "பணி"}</h3>
                            <p>${content}</p>
                        </div>`;
                } 
                else if (category === "Link") {
                    linksContainer.innerHTML += `<a href="${subtext}" target="_blank" style="margin: 0 10px; color: blue;">${content}</a>`;
                }
                // Add more logic here for Staff or Student lists
            });
        } catch (error) {
            console.error("Error loading sheet:", error);
            document.getElementById('data-container').innerHTML = "தகவல்களைப் பதிவேற்றுவதில் பிழை ஏற்பட்டுள்ளது.";
        }
    }

    fetchSheetData();
</script>

</body>
</html>
