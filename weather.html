<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>வானிலை மற்றும் வானியல் - பட்டீஸ்வரம்</title>
    <style>
        :root {
            --bg-color: #0b1026;
            --card-bg: rgba(255, 255, 255, 0.1);
            --accent: #ffeb3b;
        }

        body {
            margin: 0;
            background: radial-gradient(circle at top, #1b2735 0%, #090a0f 100%);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; padding: 40px 0; }
        header h1 { margin: 0; color: var(--accent); font-size: 2.5rem; }

        .section-title {
            border-left: 5px solid var(--accent);
            padding-left: 15px;
            margin: 40px 0 20px;
            font-size: 1.5rem;
        }

        /* 3-Day Forecast Grid */
        .day-container {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .hourly-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .hour-card {
            min-width: 90px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hour-card strong { color: var(--accent); display: block; margin-bottom: 5px; }

        /* Astro Section */
        .astro-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .astro-card {
            background: linear-gradient(145deg, #16213e, #0f3460);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .moon-visual {
            font-size: 5rem;
            margin: 20px 0;
            filter: drop-shadow(0 0 20px #fff);
        }

        .constellation-map {
            width: 100%;
            height: 200px;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            border-radius: 50%;
            margin-top: 20px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>பட்டீஸ்வரம் வானிலை & வானியல்</h1>
        <p>தஞ்சாவூர் மாவட்டம், தமிழ்நாடு</p>
    </header>

    <div id="weather-section">
        <p style="text-align: center;">தகவல்கள் சேகரிக்கப்படுகின்றன...</p>
    </div>

    <div class="section-title">இன்றைய இரவு வானம் (Astronomy)</div>
    <div class="astro-grid">
        <div class="astro-card">
            <h3>சந்திரனின் நிலை (Moon Phase)</h3>
            <div id="moon-icon" class="moon-visual">🌑</div>
            <p id="moon-name" style="font-size: 1.2rem; font-weight: bold;"></p>
            <p id="moon-details"></p>
        </div>

        <div class="astro-card">
            <h3>இன்று தெரியும் விண்மீன் மண்டலம்</h3>
            <div class="constellation-map">
                <span id="const-name" style="font-size: 1.5rem; color: var(--accent);">Loading...</span>
            </div>
            <p id="const-desc" style="margin-top: 15px; font-size: 0.9rem; opacity: 0.8;"></p>
        </div>
    </div>
</div>

<script>
    const LAT = 10.92;
    const LON = 79.35;

    async function initPage() {
        fetchWeather();
        updateMoonPhase();
        updateConstellation();
    }

    // 1. Weather Data (3 Days Hourly)
    async function fetchWeather() {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=temperature_2m,precipitation_probability,weathercode&timezone=auto&forecast_days=3`;
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            const container = document.getElementById('weather-section');
            container.innerHTML = '';

            // Grouping data by day (24 hours per day)
            for (let d = 0; d < 3; d++) {
                const date = new Date();
                date.setDate(date.getDate() + d);
                const dayName = date.toLocaleDateString('ta-IN', { weekday: 'long', day: 'numeric', month: 'long' });

                let dayHTML = `
                    <div class="section-title">${dayName}</div>
                    <div class="day-container">
                        <div class="hourly-scroll">`;

                for (let h = 0; h < 24; h++) {
                    const idx = (d * 24) + h;
                    const temp = Math.round(data.hourly.temperature_2m[idx]);
                    const rain = data.hourly.precipitation_probability[idx];
                    const time = h % 12 || 12;
                    const ampm = h >= 12 ? 'PM' : 'AM';

                    dayHTML += `
                        <div class="hour-card">
                            <strong>${time} ${ampm}</strong>
                            <span style="font-size: 1.2rem;">${temp}°C</span><br>
                            <small>💧 ${rain}%</small>
                        </div>`;
                }

                dayHTML += `</div></div>`;
                container.innerHTML += dayHTML;
            }
        } catch (e) {
            console.error("Weather Error", e);
        }
    }

    // 2. Moon Phase Calculation (Simplified)
    function updateMoonPhase() {
        const lp = 2551443; 
        const now = new Date();
        const new_moon = new Date(1970, 0, 7, 20, 35, 0);
        const phase = ((now.getTime() - new_moon.getTime()) / 1000) % lp;
        const res = Math.floor(phase / (24 * 3600));
        
        const phases = [
            { name: "அமாவாசை (New Moon)", icon: "🌑" },
            { name: "வளர்பிறை (Waxing Crescent)", icon: "🌒" },
            { name: "முதல் கால்பகுதி (First Quarter)", icon: "🌓" },
            { name: "வளர்பிறை (Waxing Gibbous)", icon: "🌔" },
            { name: "பவுர்ணமி (Full Moon)", icon: "🌕" },
            { name: "தேய்பிறை (Waning Gibbous)", icon: "🌖" },
            { name: "இறுதி கால்பகுதி (Last Quarter)", icon: "🌗" },
            { name: "தேய்பிறை (Waning Crescent)", icon: "🌘" }
        ];

        const index = Math.floor((res / 30) * 8) % 8;
        document.getElementById('moon-icon').innerText = phases[index].icon;
        document.getElementById('moon-name').innerText = phases[index].name;
        document.getElementById('moon-details').innerText = "பட்டீஸ்வரத்தில் இன்று இரவு சந்திரனின் தோற்றம்.";
    }

    // 3. Constellation Logic (Seasonal Display)
    function updateConstellation() {
        const month = new Date().getMonth();
        const constellations = [
            { name: "Orion (வேடன்)", desc: "இன்று இரவு வானில் பிரகாசமான மூன்று நட்சத்திரங்களைக் கொண்ட வேடன் மண்டலம் தெரியும்." },
            { name: "Leo (சிம்மம்)", desc: "வானின் உச்சியில் கம்பீரமான சிம்ம விண்மீன் மண்டலம் இன்று தெரியும்." },
            { name: "Scorpius (விருச்சிகம்)", desc: "தெற்கு வானில் தேள் வடிவ விருச்சிக மண்டலத்தை இன்று காணலாம்." },
            { name: "Pegasus (பெகாசஸ்)", desc: "பறக்கும் குதிரை வடிவிலான பெகாசஸ் மண்டலம் இன்று தெளிவாகத் தெரியும்." }
        ];

        // Pick one based on season
        const pick = constellations[Math.floor(month / 3)];
        document.getElementById('const-name').innerText = pick.name;
        document.getElementById('const-desc').innerText = pick.desc;
    }

    initPage();
</script>

</body>
  </html>
