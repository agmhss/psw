<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>முன்னாள் மாணவர் சாதனையாளர் கூடம் | School Alumni</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root {
            --prestige-gold: #D4AF37;
            --royal-blue: #002366;
            --light-bg: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--light-bg); margin: 0; padding: 20px; }
        
        .container { max-width: 1100px; margin: 0 auto; text-align: center; }
        
        .header { margin-bottom: 50px; }
        .header h1 { color: var(--royal-blue); font-size: 2.5rem; margin-bottom: 10px; }
        .header p { color: #666; max-width: 700px; margin: 0 auto; }

        /* Hall of Fame Grid */
        #hof-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        /* Card Design */
        .hof-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            transition: 0.3s;
            border: 1px solid #eee;
            text-align: left;
        }

        .hof-card:hover { transform: translateY(-10px); border-color: var(--prestige-gold); }

        .ai-rating { position: absolute; top: 15px; right: 15px; text-align: right; }
        .rating-val { font-weight: bold; color: var(--royal-blue); display: block; }
        .stars { color: var(--prestige-gold); font-size: 0.9rem; }

        .student-img {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--prestige-gold);
            margin: 0 auto 15px; display: block;
        }

        .student-info h4 { margin: 5px 0; color: #333; text-align: center; font-size: 1.3rem; }
        .batch { display: block; text-align: center; color: #888; font-weight: bold; margin-bottom: 15px; }

        .details-list { list-style: none; padding: 0; font-size: 0.9rem; color: #555; }
        .details-list li { margin-bottom: 8px; padding-left: 20px; position: relative; }
        .details-list li::before { content: '🏆'; position: absolute; left: 0; }

        .btn-download {
            width: 100%; padding: 10px; margin-top: 15px;
            background: var(--royal-blue); color: white;
            border: none; border-radius: 5px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }

        .btn-download:hover { background: var(--prestige-gold); }

        /* Top Performer Ribbon */
        .top-performer { border: 2px solid var(--prestige-gold); background: #fffdf2; }

        @media print { .btn-download { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>சாதனையாளர் கூடம் (Hall of Fame)</h1>
        <p>எமது பள்ளியின் பெருமைமிக்க முன்னாள் மாணவர்களின் சாதனைகள் AI தொழில்நுட்பம் மூலம் வரிசைப்படுத்தப்பட்டுள்ளது.</p>
        <br>
        <a href="https://forms.gle/NgkcbPJ4QTfTYCdq6" target="_blank" style="color: var(--royal-blue); font-weight: bold;">நீங்களும் இணைய வேண்டுமா? இங்கே கிளிக் செய்யவும் →</a>
    </div>

    <div id="hof-grid-container">
        <p>விவரங்கள் சேகரிக்கப்படுகின்றன, தயவுசெய்து காத்திருக்கவும்...</p>
    </div>
</div>
<script>
    // 1. உங்கள் Google Sheet CSV லிங்க் (சரிபார்க்கப்பட்டது)
    const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR19oUMrVWftMtbEnGUQE5DZyDyn5iRFGEe3ObqeTyCEi2_i_E6__-fli6x4od_vz8PDncLDfpPaT7P/pub?output=csv";

    // 2. Google Drive படங்களை நேரடி லிங்காக மாற்ற (திருத்தப்பட்டது)
    function fixDriveLink(url) {
        if (!url) return 'https://via.placeholder.com/150';
        
        let fileId = '';
        if (url.includes('id=')) {
            fileId = url.split('id=')[1].split('&')[0];
        } else if (url.includes('/d/')) {
            fileId = url.split('/d/')[1].split('/')[0];
        }

        if (fileId) {
            // கூகுள் டிரைவ் நேரடிப் படக் காட்சி லிங்க் (lh3 முறை மிகவும் சிறந்தது)
            return `https://lh3.googleusercontent.com/d/0{fileId}`;
        }
        return url;
    }

    // 3. PDF பதிவிறக்க செயல்பாடு (திருத்தப்பட்டது - CORS பிரச்சனையைத் தவிர்க்க)
    async function downloadPDF(id, name) {
        const card = document.getElementById(id);
        const img = card.querySelector('.student-img');
        
        // படத்தைச் சான்றிதழில் சேர்க்க Base64-க்கு மாற்ற வேண்டும்
        const originalSrc = img.src;
        
        if (originalSrc && !originalSrc.startsWith('data:')) {
            try {
                const response = await fetch(originalSrc);
                const blob = await response.blob();
                const reader = new FileReader();
                await new Promise((resolve) => {
                    reader.onloadend = () => {
                        img.src = reader.result; // படத்தைப் தற்காலிகமாக Base64-க்கு மாற்றுகிறோம்
                        resolve();
                    };
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                console.error("Image fetch failed, using placeholder:", e);
                img.src = 'https://via.placeholder.com/150'; // படம் கிடைக்காவிட்டால் பிளேஸ்ஹோல்டர்
            }
        }

        // PDF ஆப்ஷன்கள்
        const opt = {
            margin: 15,
            filename: name + '_Alumni_Award.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, logging: false },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };

        // PDF உருவாக்குதல்
        try {
            await html2pdf().set(opt).from(card).save();
        } finally {
            // PDF உருவாக்கிய பிறகு, பழைய பட லிங்கிற்குத் திருப்பிக் கொண்டு வருதல்
            img.src = originalSrc;
        }
    }

    // 4. தரவுகளைப் பெற்று அட்டைகளை உருவாக்குதல்
    async function initHallOfFame() {
        try {
            const response = await fetch(csvURL);
            const data = await response.text();
            
            // CSV வரிகளைப் பிரித்தல் (Windows & Linux format support)
            const rows = data.split(/\r?\n/);
            const container = document.getElementById('hof-grid-container');
            container.innerHTML = '';

            let alumni = rows.map(row => {
                // கமா (,) உள்ளடக்கத்திற்குள் இருந்தால் தரவு சிதையாமல் இருக்க regex
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                const clean = (val) => (val || "").replace(/"/g, "").trim();

                // காலம்களின் எண்ணிக்கை 6-க்கு மேல் இருந்தால் மட்டுமே தரவுகளை எடுக்க
                if (c.length < 6) return null;

                return { 
                    name: clean(c[2]), 
                    batch: clean(c[3]), 
                    pic: clean(c[4]), 
                    edu: clean(c[5]), 
                    job: clean(c[6]), 
                    help: clean(c[7]),
                    ach: clean(c[8]), 
                    score: parseFloat(clean(c[9])) || 0, 
                    stars: clean(c[10]) || "☆☆☆☆☆" 
                };
            })
            // தேவையற்ற வரிகளைத் தவிர்க்க
            .filter(a => a !== null && a.name && a.name !== "பெயர்" && a.name !== "Name" && a.name.length > 1);

            // அதிக ஸ்கோர் உள்ளவர்களை முதலில் காட்ட
            alumni.sort((a, b) => b.score - a.score);

            if (alumni.length === 0) {
                container.innerHTML = "<p>தற்போது தகவல்கள் ஏதும் இல்லை.</p>";
                return;
            }

            alumni.forEach((person, i) => {
                const id = `card-${i}`;
                const topClass = i === 0 ? 'top-performer' : '';
                container.innerHTML += `
                    <div class="hof-card ${topClass}" id="${id}">
                        <div class="ai-rating">
                            <span class="rating-val">${person.score}</span>
                            <span class="stars">${person.stars}</span>
                        </div>
                        <img src="${fixDriveLink(person.pic)}" 
                             class="student-img" 
                             alt="Profile" 
                             onerror="this.src='https://via.placeholder.com/150'"
                             crossorigin="anonymous"> <div class="student-info">
                            <h4>${person.name}</h4>
                            <span class="batch">ஆண்டு: ${person.batch}</span>
                        </div>
                        <ul class="details-list">
                            <li><strong>கல்வி:</strong> ${person.edu}</li>
                            <li><strong>பணி:</strong> ${person.job}</li>
                            <li><strong>உதவி:</strong> ${person.help}</li>
                            <li><strong>சாதனைகள்:</strong> ${person.ach}</li>
                        </ul>
                        <button class="btn-download" onclick="downloadPDF('${id}', '${person.name}')">சான்றிதழ் பதிவிறக்கு 📥</button>
                    </div>
                `;
            });
        } catch (e) {
            console.error("Error:", e);
            document.getElementById('hof-grid-container').innerHTML = "தரவுகளை லோடு செய்வதில் பிழை ஏற்பட்டுள்ளது.";
        }
    }

    initHallOfFame();
                </script>

            
</body>
</html>
