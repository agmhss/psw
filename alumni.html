<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>முன்னாள் மாணவர் சாதனையாளர் கூடம் | School Alumni</title>
    
    <style>
        :root {
            --prestige-gold: #D4AF37;
            --royal-blue: #002366;
            --light-bg: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: var(--light-bg); 
            margin: 0; 
            padding: 20px; 
        }
        
        .container { max-width: 1100px; margin: 0 auto; text-align: center; }
        
        .header { margin-bottom: 50px; }
        .header h1 { color: var(--royal-blue); font-size: 2.5rem; margin-bottom: 10px; }
        .header p { color: #666; max-width: 700px; margin: 0 auto; }

        /* Hall of Fame Grid */
        #hof-grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        /* Card Design */
        .hof-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            position: relative;
            transition: 0.3s;
            border: 1px solid #eee;
            text-align: left;
        }

        .hof-card:hover { transform: translateY(-10px); border-color: var(--prestige-gold); }

        .ai-rating { position: absolute; top: 15px; right: 15px; text-align: right; }
        .rating-val { font-weight: bold; color: var(--royal-blue); display: block; }
        .stars { color: var(--prestige-gold); font-size: 0.9rem; }

        .student-img {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover; border: 3px solid var(--prestige-gold);
            margin: 0 auto 15px; display: block;
        }

        .student-info h4 { margin: 5px 0; color: #333; text-align: center; font-size: 1.3rem; }
        .batch { display: block; text-align: center; color: #888; font-weight: bold; margin-bottom: 15px; }

        .details-list { list-style: none; padding: 0; font-size: 0.9rem; color: #555; }
        .details-list li { margin-bottom: 8px; padding-left: 20px; position: relative; }
        .details-list li::before { content: '🏆'; position: absolute; left: 0; }

        /* Top Performer Highlight */
        .top-performer { border: 2px solid var(--prestige-gold); background: #fffdf2; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>முன்னாள் மாணவர்கள் புகழ் மண்டபம்</h1>
        <p>நமது பள்ளியின் பெருமைமிக்க முன்னாள் மாணவர்களின் சாதனைகள் AI தொழில்நுட்பம் மூலம் வரிசைப்படுத்தப்பட்டுள்ளது.</p>
        <br>
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px;">
    <input type="radio" id="join-radio" name="join-option" checked style="accent-color: #28a745; cursor: pointer; width: 20px; height: 20px;">
    
    <button onclick="window.open('https://forms.gle/NgkcbPJ4QTfTYCdq6', '_blank')" 
            style="background-color: #28a745; 
                   color: white; 
                   padding: 12px 25px; 
                   border: none; 
                   border-radius: 5px; 
                   font-size: 16px; 
                   font-weight: bold; 
                   cursor: pointer; 
                   transition: 0.3s;
                   display: flex;
                   align-items: center;
                   gap: 8px;">
        நீங்களும் இணைய வேண்டுமா? இங்கே கிளிக் செய்யவும் →
    </button>
</div>

    <div id="hof-grid-container">
        <p>விவரங்கள் சேகரிக்கப்படுகின்றன, தயவுசெய்து காத்திருக்கவும்...</p>
    </div>
</div>

<script>
    // 1. Google Sheet CSV லிங்க்
    const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR19oUMrVWftMtbEnGUQE5DZyDyn5iRFGEe3ObqeTyCEi2_i_E6__-fli6x4od_vz8PDncLDfpPaT7P/pub?output=csv";

    // 2. Google Drive படங்களை நேரடி லிங்காக மாற்ற
    function fixDriveLink(url) {
        if (!url) return 'https://via.placeholder.com/150';
        
        let fileId = '';
        if (url.includes('id=')) {
            fileId = url.split('id=')[1].split('&')[0];
        } else if (url.includes('/d/')) {
            fileId = url.split('/d/')[1].split('/')[0];
        }

        if (fileId) {
            return `https://lh3.googleusercontent.com/d/${fileId}`;
        }
        return url;
    }

    // 3. தரவுகளைப் பெற்று கார்டுகளை உருவாக்குதல்
    async function initHallOfFame() {
    async function initHallOfFame() {
    try {
        const response = await fetch(csvURL);
        const data = await response.text();
        
        const rows = data.split(/\r?\n/);
        const container = document.getElementById('hof-grid-container');
        container.innerHTML = '';

        let alumni = rows.map(row => {
            const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            const clean = (val) => (val || "").replace(/"/g, "").trim();

            if (c.length < 6) return null;

            return { 
                name: clean(c[2]), 
                batch: clean(c[3]), 
                pic: clean(c[4]), 
                edu: clean(c[5]), 
                job: clean(c[6]), 
                cont: clean(c[7]),
                ach: clean(c[8]), 
                score: parseFloat(clean(c[9])) || 0, 
                stars: clean(c[10]) || "☆☆☆☆☆" 
            };
        })
        .filter(a => {
            // மிக முக்கியமான பகுதி: 
            // 1. 'a' காலியாக இருக்கக்கூடாது.
            // 2. பெயர் (name) கண்டிப்பாக 2 எழுத்துக்களுக்கு மேல் இருக்க வேண்டும்.
            // 3. கல்வி (edu) விவரம் கண்டிப்பாக இருக்க வேண்டும்.
            // 4. இது தலைப்பு வரியாக (Header) இருக்கக்கூடாது.
            
            if (!a) return false;
            
            const hasName = a.name && a.name.length > 1;
            const hasEdu = a.edu && a.edu.length > 2;
            const isNotHeader = !["பெயர்", "NAME", "TIMESTAMP", "நேர"].includes(a.name.toUpperCase());

            // பெயர் மற்றும் கல்வி இருந்தால் மட்டுமே கார்டு உருவாகும்
            return hasName && hasEdu && isNotHeader;
        });

        alumni.sort((a, b) => b.score - a.score);

        if (alumni.length === 0) {
            container.innerHTML = "<p style='grid-column: 1/-1;'>தற்போது தகவல்கள் ஏதும் இல்லை.</p>";
            return;
        }

        alumni.forEach((person, i) => {
            const topClass = i === 0 ? 'top-performer' : '';
            // இங்கும் ஒரு பாதுகாப்பு: பெயர் "undefined" என்று இருந்தால் காட்டாதே
            if(person.name === "undefined") return;

            container.innerHTML += `
                <div class="hof-card ${topClass}">
                    <div class="ai-rating">
                        <span class="rating-val">${person.score}</span>
                        <span class="stars">${person.stars}</span>
                    </div>
                    <img src="${fixDriveLink(person.pic)}" 
                         class="student-img" 
                         alt="${person.name}" 
                         onerror="this.src='https://via.placeholder.com/150'">
                    <div class="student-info">
                        <h4>${person.name}</h4>
                        <span class="batch">ஆண்டு: ${person.batch}</span>
                    </div>
                    <ul class="details-list">
                        <li><strong>கல்வி:</strong> ${person.edu}</li>
                        <li><strong>பணி:</strong> ${person.job}</li>
                        <li><strong>பங்களிப்பு:</strong> ${person.cont}</li>
                        <li><strong>சாதனைகள்:</strong> ${person.ach}</li>
                    </ul>
                </div>
            `;
        });
    } catch (e) {
        console.error("Error:", e);
        document.getElementById('hof-grid-container').innerHTML = "தரவுகளை லோடு செய்வதில் பிழை ஏற்பட்டுள்ளது.";
    }
}
    initHallOfFame();
</script>
</body>
</html>
