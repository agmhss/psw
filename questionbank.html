<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Paper Vault | AGMHSS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        header {
            background-color: #2c3e50;
            color: white;
            width: 100%;
            text-align: center;
            padding: 30px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }

        header p {
            margin: 10px 0 0 0;
            font-size: 16px;
            color: #bdc3c7;
        }

        /* Container for the Google Form */
        .form-container {
            width: 100%;
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            overflow: hidden; /* Keeps the iframe corners rounded */
            padding: 20px;
            box-sizing: border-box;
        }

        /* Responsive iframe styling */
        iframe {
            width: 100%;
            height: 900px; /* Adjust this based on your form's length */
            border: none;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            .form-container {
                margin: 20px 10px;
                padding: 10px;
            }
            header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Anna Government Model Hr Sec School, Patteeswaram</h1>
        <p>Smart School Initiative | Digital Question Paper Vault</p>
    </header>

    <div class="form-container">
        <iframe src="YOUR_GOOGLE_FORM_LINK_HERE?embedded=true" frameborder="0" marginheight="0" marginwidth="0">
            Loading portal...
        </iframe>
    </div>

    <footer>
        &copy; 2026 AGMHSS Patteeswaram. Automated IT Infrastructure.
    </footer>

</body>
</html>
