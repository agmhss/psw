<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    body { box-sizing: border-box; }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto flex items-center justify-center" style="background: #0a0a0a; font-family: 'DM Sans', sans-serif;">
   <main class="w-full max-w-md mx-auto px-6 py-12">
    <div class="text-center mb-8">
     <h1 id="title" class="text-3xl font-bold mb-2" style="color: #e0ffe0; font-family: 'Space Mono', monospace;">QR Code Generator</h1>
     <p id="subtitle" class="text-sm" style="color: #6b7b6b;">Enter text or a URL below</p>
    </div>
    <div class="rounded-2xl p-6 mb-6" style="background: #141a14; border: 1px solid #1f2e1f;">
        <label for="qr-input" class="block text-xs font-semibold uppercase tracking-widest mb-3" style="color: #4a6a4a;">Content</label> 
        <textarea id="qr-input" rows="3" placeholder="https://example.com" class="w-full rounded-lg px-4 py-3 text-sm outline-none resize-none placeholder-opacity-40" style="background: #0d120d; border: 1px solid #1f2e1f; color: #c8e6c8; caret-color: #5aff5a;"></textarea> 
        <button id="generate-btn" onclick="generateQR()" class="w-full mt-4 py-3 rounded-lg font-semibold text-sm transition-all duration-200 hover:scale-[1.02] active:scale-[0.98]" style="background: #1aff1a; color: #0a0a0a;"> Generate QR Code </button>
    </div>
    <div id="qr-output" class="hidden">
     <div class="rounded-2xl p-8 flex flex-col items-center" style="background: #141a14; border: 1px solid #1f2e1f;">
      <div id="qr-canvas-wrap" class="rounded-xl p-4 mb-4 flex items-center justify-center" style="background: #ffffff; width: 232px; height: 232px;">
       <img id="qr-image" alt="Generated QR Code" style="display: none;" width="200" height="200" />
       <p id="qr-loading" class="text-xs font-semibold" style="color: #0a0a0a; display: none;">Loading...</p>
      </div>
      <p id="qr-text-preview" class="text-xs text-center truncate max-w-full mt-2 mb-4" style="color: #4a6a4a;"></p>
      <button onclick="downloadQR()" class="flex items-center gap-2 py-2 px-5 rounded-lg text-sm font-medium transition-all hover:scale-[1.02]" style="background: #1f2e1f; color: #8aff8a;"> 
        <i data-lucide="download" style="width:16px;height:16px;"></i> Download PNG 
      </button>
     </div>
    </div>
   </main>
  </div>
  <script>
    let currentText = '';

    function generateQR() {
      const input = document.getElementById('qr-input').value.trim();
      
      if (!input) {
        alert("Please enter a URL or some text first!");
        return;
      }

      currentText = input;
      const qrImage = document.getElementById('qr-image');
      const loadingText = document.getElementById('qr-loading');
      
      // Show output container and loading state
      document.getElementById('qr-output').classList.remove('hidden');
      qrImage.style.display = 'none';
      loadingText.style.display = 'block';
      lucide.createIcons();
      
      // Request generation via API
      const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(input)}&color=0a0a0a&bgcolor=ffffff&margin=0`;
      
      qrImage.onload = () => {
          loadingText.style.display = 'none';
          qrImage.style.display = 'block';
          document.getElementById('qr-text-preview').textContent = input.length > 50 ? input.slice(0, 50) + '…' : input;
      };
      
      qrImage.onerror = () => {
          loadingText.style.display = 'none';
          alert("Failed to fetch the image. Please check your internet connection.");
      };

      // Setting the source triggers the download/onload event
      qrImage.src = apiUrl;
    }

    async function downloadQR() {
      const input = document.getElementById('qr-input').value.trim();
      if (!input) return;
      
      // Fetch a higher resolution version for downloading
      const url = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(input)}&color=0a0a0a&bgcolor=ffffff&margin=0`;
      
      try {
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = 'qrcode.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
      } catch (e) {
        alert("Download blocked by browser. You can long-press the QR code image above and select 'Save Image' instead.");
      }
    }

    document.getElementById('qr-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generateQR(); }
    });

    const defaultConfig = {
      page_title: 'QR Code Generator',
      page_subtitle: 'Enter text or a URL below',
      background_color: '#0a0a0a',
      surface_color: '#141a14',
      text_color: '#e0ffe0',
      primary_action_color: '#1aff1a',
      secondary_action_color: '#4a6a4a',
      font_family: 'Space Mono',
      font_size: 16
    };

    function applyConfig(config) {
      const bg = config.background_color || defaultConfig.background_color;
      const surface = config.surface_color || defaultConfig.surface_color;
      const text = config.text_color || defaultConfig.text_color;
      const primary = config.primary_action_color || defaultConfig.primary_action_color;
      const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
      const font = config.font_family || defaultConfig.font_family;
      const size = config.font_size || defaultConfig.font_size;

      const app = document.getElementById('app');
      app.style.background = bg;

      document.getElementById('title').textContent = config.page_title || defaultConfig.page_title;
      document.getElementById('title').style.color = text;
      document.getElementById('title').style.fontFamily = `${font}, monospace`;
      document.getElementById('title').style.fontSize = `${size * 1.9}px`;

      document.getElementById('subtitle').textContent = config.page_subtitle || defaultConfig.page_subtitle;
      document.getElementById('subtitle').style.color = secondary;
      document.getElementById('subtitle').style.fontSize = `${size * 0.85}px`;

      document.querySelectorAll('.rounded-2xl').forEach(el => {
        el.style.background = surface;
        el.style.borderColor = secondary + '33';
      });

      const btn = document.getElementById('generate-btn');
      btn.style.background = primary;
      btn.style.color = bg;
      btn.style.fontSize = `${size * 0.85}px`;

      const input = document.getElementById('qr-input');
      input.style.background = bg;
      input.style.color = text;
      input.style.fontSize = `${size}px`;

      document.getElementById('qr-text-preview').style.color = secondary;
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => applyConfig(config),
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } },
          ],
          borderables: [],
          fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
          fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } },
        }),
        mapToEditPanelValues: (config) => new Map([
          ['page_title', config.page_title || defaultConfig.page_title],
          ['page_subtitle', config.page_subtitle || defaultConfig.page_subtitle],
        ])
      });
    }

    applyConfig(defaultConfig);
    lucide.createIcons();
  </script>
</body>
</html>
